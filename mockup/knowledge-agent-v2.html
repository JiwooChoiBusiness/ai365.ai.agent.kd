<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ai 365 AI AGENT — 지식 수집·적재 에이전트</title>
<meta name="color-scheme" content="light" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 26 24'%3E%3Cpath d='M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z' fill='none' stroke='%232E6BE6' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ctext x='15.8' y='22.5' font-family='sans-serif' font-weight='800' font-size='12' fill='%23F4731C'%3E3%3C/text%3E%3C/svg%3E" />
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

/* ── 디자인 토큰 ── */
:root{
  --bg:#F3F4F7;
  --surface:#FFFFFF;
  --line:#E6E8EE; --line2:rgba(16,24,40,.06);
  --text:#181C25; --t2:#4C5361; --t3:#7F8694;
  --navy:#1B2A6B; --navy-bg:rgba(27,42,107,.08);
  --ok:#0E9F5C; --ok-bg:rgba(14,159,92,.10);
  --teal:#0E8074; --teal-bg:rgba(14,128,116,.10);
  --warn:#DA7B00; --warn-bg:rgba(224,134,0,.11); --warn-tx:#8A5200;
  --risk:#B42318; --risk-bg:rgba(180,35,24,.08);
  --dark:#454A55; --dark-bg:rgba(69,74,85,.10);
  --orange:#F4731C; --orange-2:#E0640D;
  --viol:#6A2FE0; --viol-bg:rgba(106,47,224,.09);
  --sh-xs:0 1px 2px rgba(16,24,40,.05);
  --sh-sm:0 1px 2px rgba(16,24,40,.05),0 4px 14px rgba(16,24,40,.06);
  --sh-md:0 2px 4px rgba(16,24,40,.05),0 12px 32px rgba(16,24,40,.09);
  --sh-lg:0 24px 64px -12px rgba(16,24,40,.32);
  --font:'Pretendard Variable',Pretendard,system-ui,-apple-system,'Segoe UI',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{color:var(--text);font-family:var(--font);font-size:13.5px;
  background:radial-gradient(1100px 460px at 12% -140px,rgba(27,42,107,.07),transparent 60%),
             radial-gradient(900px 420px at 92% -180px,rgba(244,115,28,.06),transparent 60%),var(--bg);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:rgba(244,115,28,.24)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#CBD2DD;border-radius:8px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:#B4BDCB;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}
button{font-family:inherit}
input,select,textarea{font-family:inherit;color:var(--text)}
input,select,textarea{accent-color:var(--navy)}
input[type=range]{accent-color:var(--orange)}

.app{width:100%;margin:0;padding:0 28px 44px}

/* ── 헤더 (스티키 글래스 바) ── */
.hd{position:sticky;top:12px;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:14px;
  margin:14px 0 0;padding:10px 16px;min-height:60px;
  background:rgba(255,255,255,.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh-sm)}
.hd-l{display:flex;align-items:center;gap:12px;min-width:0}
.kd-svg{height:38px;width:38px;display:block;flex-shrink:0;filter:drop-shadow(0 2px 5px rgba(27,42,107,.28))}
.brand{display:flex;align-items:baseline;gap:7px;letter-spacing:-.02em;white-space:nowrap}
.brand b{font-weight:800;font-size:16.5px;color:var(--navy)}
.brand span{font-weight:700;color:var(--t3);font-size:11px;letter-spacing:.09em}
.hd-sub{font-size:11.5px;color:var(--t3);margin-top:2px;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hd-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.live{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;color:var(--ok);
  background:var(--ok-bg);border-radius:999px;padding:7px 12px;white-space:nowrap}
.live i{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(14,159,92,.45)}55%{box-shadow:0 0 0 5px rgba(14,159,92,0)}}

/* ── 버튼 ── */
.btn{display:inline-flex;align-items:center;gap:7px;font-weight:650;font-size:13px;
  padding:9px 14px;border-radius:11px;cursor:pointer;border:1px solid var(--line);background:var(--surface);
  color:var(--t2);transition:border-color .15s,color .15s,background .15s,box-shadow .15s;box-shadow:var(--sh-xs)}
.btn:hover:not(:disabled){border-color:rgba(27,42,107,.4);color:var(--navy)}
.btn:disabled{opacity:.5;cursor:default}
.btn.primary{background:linear-gradient(180deg,#FF8B3D,var(--orange));color:#fff;border:none;
  box-shadow:0 1px 2px rgba(16,24,40,.08),0 6px 16px rgba(244,115,28,.32),inset 0 1px 0 rgba(255,255,255,.25)}
.btn.primary:hover:not(:disabled){color:#fff;background:linear-gradient(180deg,#F87F2C,var(--orange-2))}
.btn.danger{color:var(--risk);border-color:rgba(180,35,24,.3)}
.btn.danger:hover:not(:disabled){background:var(--risk-bg);color:var(--risk);border-color:var(--risk)}
.btn.sm{padding:7px 11px;font-size:12px;border-radius:9px}
.btn:focus-visible,.tab:focus-visible,.kpi:focus-visible,.rbtn:focus-visible,.fchip:focus-visible,.sw:focus-visible,.mtab:focus-visible{outline:2px solid var(--orange);outline-offset:2px}

/* ── KPI ── */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:18px 0 0}
.kpi{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:14px 16px 13px;
  cursor:pointer;transition:transform .16s,box-shadow .16s,border-color .16s;text-align:left;box-shadow:var(--sh-xs)}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.kpi.cur{border-color:transparent;box-shadow:0 0 0 2px var(--navy),var(--sh-sm)}
.kpi-top{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2);font-weight:650;margin-bottom:10px}
.kpi-ico{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.kpi-go{margin-left:auto;color:var(--t3);opacity:0;transform:translateX(-4px);transition:.16s}
.kpi:hover .kpi-go{opacity:1;transform:none}
.kpi-num{font-weight:800;font-size:30px;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.kpi-num small{font-size:12px;color:var(--t3);font-weight:600;margin-left:3px;letter-spacing:0}
.kpi-hint{font-size:11px;color:var(--t3);margin-top:6px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.kpi.navy .kpi-ico{background:var(--navy-bg);color:var(--navy)} .kpi.navy .kpi-num{color:var(--navy)}
.kpi.ok .kpi-ico{background:var(--ok-bg);color:var(--ok)} .kpi.ok .kpi-num{color:var(--ok)}
.kpi.warn .kpi-ico{background:var(--warn-bg);color:var(--warn)} .kpi.warn .kpi-num{color:var(--warn)}
.kpi.risk .kpi-ico{background:var(--risk-bg);color:var(--risk)} .kpi.risk .kpi-num{color:var(--risk)}
.kpi.viva .kpi-ico{background:var(--viol-bg);color:var(--viol)} .kpi.viva .kpi-num{color:var(--viol)}
.kpi.warn.cur{box-shadow:0 0 0 2px var(--warn),var(--sh-sm)}
.kpi.ok.cur{box-shadow:0 0 0 2px var(--ok),var(--sh-sm)}
.kpi.risk.cur{box-shadow:0 0 0 2px var(--risk),var(--sh-sm)}

/* ── 파이프라인 스트립 ── */
.pipe{display:flex;align-items:stretch;gap:4px;margin:12px 0 0;padding:11px 12px 9px;
  background:var(--surface);border:1px solid var(--line);border-radius:15px;box-shadow:var(--sh-xs);
  overflow-x:auto;scrollbar-width:thin;scrollbar-color:#DCE0E8 transparent}
.pipe::-webkit-scrollbar{height:6px}
.pipe::-webkit-scrollbar-thumb{background:#E0E4EA;border:none;background-clip:border-box;border-radius:6px}
.pipe::-webkit-scrollbar-thumb:hover{background:#CBD2DD;border:none;background-clip:border-box}
.pipe-node{display:flex;align-items:center;gap:6px;flex:1 0 auto;
  background:#FAFBFC;border:1px solid var(--line);border-radius:12px;padding:8px 10px;transition:border-color .2s,box-shadow .2s}
.pipe-node.active{background:#fff;border-color:rgba(244,115,28,.65);box-shadow:0 0 0 3px rgba(244,115,28,.14)}
.pipe-tt{font-size:11.5px;font-weight:750;color:var(--text);white-space:nowrap}
.pipe-step{width:19px;height:19px;border-radius:6.5px;display:grid;place-items:center;flex-shrink:0;
  font-size:10.5px;font-weight:800;font-variant-numeric:tabular-nums}
.pipe-step.ai{background:var(--navy-bg);color:var(--navy)}
.pipe-step.hu{background:var(--warn-bg);color:var(--warn)}
.pipe-step.lock{background:var(--risk-bg);color:var(--risk)}
.pipe-step.sys{background:var(--viol-bg);color:var(--viol)}
.pipe-node.active .pipe-step{background:var(--orange);color:#fff;animation:pulse-o 1.6s ease infinite}
@keyframes pulse-o{0%,100%{box-shadow:0 0 0 0 rgba(244,115,28,.4)}55%{box-shadow:0 0 0 5px rgba(244,115,28,0)}}
.pipe-cnt{margin-left:auto;font-size:10.5px;font-weight:750;color:var(--t2);background:#EFF1F5;border-radius:20px;padding:1.5px 7px;font-variant-numeric:tabular-nums}
.pipe-arr{display:grid;place-items:center;color:#C6CCD6;flex-shrink:0;margin:0 -1px}
.who-badge{font-size:9.5px;font-weight:800;letter-spacing:.03em;border-radius:5px;padding:2px 5px;flex-shrink:0}
.who-badge.ai{background:var(--navy-bg);color:var(--navy)}
.who-badge.hu{background:var(--warn-bg);color:var(--warn)}
.who-badge.lock{background:var(--risk-bg);color:var(--risk)}
.who-badge.sys{background:var(--viol-bg);color:var(--viol)}

/* ── 만료 배너 ── */
.banner{display:flex;align-items:center;gap:10px;margin:12px 0 0;padding:11px 15px;border-radius:12px;
  font-size:12.5px;font-weight:600;line-height:1.55;color:var(--warn-tx);
  background:linear-gradient(0deg,var(--warn-bg),var(--warn-bg)),var(--surface);
  border:1px solid rgba(224,134,0,.28);border-left:3px solid var(--warn)}
.banner svg{flex-shrink:0;color:var(--warn)}
.banner a{color:var(--warn-tx);font-weight:800;cursor:pointer;text-decoration:underline;text-underline-offset:2px}

/* ── 동기화 스트립 ── */
.sync{display:flex;align-items:center;gap:10px;margin:12px 0 0;padding:11px 15px;border-radius:12px;
  background:linear-gradient(0deg,var(--navy-bg),var(--navy-bg)),var(--surface);
  border:1px solid rgba(27,42,107,.2);color:var(--navy);font-size:12.5px;font-weight:650}
.sync .bar{flex:1;height:6px;border-radius:4px;background:rgba(27,42,107,.14);overflow:hidden}
.sync .bar span{display:block;height:100%;background:linear-gradient(90deg,var(--navy),#3B4FA8);width:0%;transition:width .5s;border-radius:4px}

/* ── 탭 (세그먼트) ── */
.tabs{position:sticky;top:84px;z-index:30;display:flex;gap:3px;margin:14px 0 0;padding:5px;
  background:rgba(255,255,255,.86);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh-xs);
  overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font-weight:650;font-size:12.5px;color:var(--t2);background:none;border:none;cursor:pointer;
  padding:8px 12px;border-radius:9.5px;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;
  transition:background .14s,color .14s;flex-shrink:0}
.tab:hover{background:#F1F3F7;color:var(--text)}
.tab.active{color:#fff;background:var(--navy);box-shadow:0 2px 8px rgba(27,42,107,.3)}
.tab .cnt{font-size:10.5px;font-weight:750;background:#EDEFF4;color:var(--t2);border-radius:20px;padding:1.5px 7px;font-variant-numeric:tabular-nums}
.tab.active .cnt{background:rgba(255,255,255,.18);color:#fff}
.view{padding:16px 0 30px}
@keyframes vf{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.vfade{animation:vf .26s cubic-bezier(.2,.7,.3,1)}

/* ── 공통 칩·배지 ── */
.lv{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;border-radius:7px;padding:3px 8px;letter-spacing:.01em;white-space:nowrap}
.lv::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.75}
.lv.l1{background:var(--ok-bg);color:var(--ok)} .lv.l2{background:var(--teal-bg);color:var(--teal)}
.lv.l3{background:var(--warn-bg);color:var(--warn)} .lv.l4{background:var(--risk-bg);color:var(--risk)}
.lv.l5{background:var(--dark-bg);color:var(--dark)}
.conf{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--t2);font-variant-numeric:tabular-nums}
.conf .bar{width:44px;height:5px;border-radius:4px;background:#E9EBF0;overflow:hidden}
.conf .bar i{display:block;height:100%;border-radius:4px}
.conf.low{color:var(--warn)}
.route{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:750;border-radius:7px;padding:3px 8px;white-space:nowrap}
.route.ok{background:var(--ok-bg);color:var(--ok)} .route.warn{background:var(--warn-bg);color:var(--warn)}
.route.risk{background:var(--risk-bg);color:var(--risk)} .route.dark{background:var(--dark-bg);color:var(--dark)}
.route.mut{background:#EFF1F5;color:var(--t3)} .route.navy{background:var(--navy-bg);color:var(--navy)}
.tpill{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:var(--t2);background:#F2F4F7;border-radius:6px;padding:2px 7px;white-space:nowrap}
.eq{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--t2);background:#F8F9FB;border:1px dashed #D9DDE5;border-radius:9px;padding:4.5px 10px;flex-wrap:wrap}
.eq b{color:var(--navy)}
.chipline{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.sig{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:var(--t2);
  background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:3px 8px;line-height:1.5}
.sig b{color:var(--navy);font-weight:750}
.sig.ok{border-color:rgba(14,159,92,.45)}
.sig.warn{border-color:rgba(218,123,0,.5);color:var(--warn)}
.sig.warn b{color:inherit}
.sig.risk{border-color:rgba(180,35,24,.5);color:var(--risk)}
.sig.risk b{color:inherit}
.sig.def{background:#F6F7FA}
.sig.user{border-color:rgba(27,42,107,.45)}
.defkw{color:var(--t3);font-weight:750}
.evd{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:600;color:var(--viol);background:var(--viol-bg);border-radius:7px;padding:2.5px 8px}

/* ── 검토 카드 ── */
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(390px,1fr));gap:14px}
.rcard{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px 17px;
  display:flex;flex-direction:column;gap:10px;box-shadow:var(--sh-xs);transition:box-shadow .2s,border-color .2s,opacity .25s,transform .25s}
.rcard:hover{box-shadow:var(--sh-sm)}
.rcard.leaving{opacity:0;transform:translateX(14px)}
.rcard-top{display:flex;align-items:flex-start;gap:10px}
.rcard-title{font-weight:750;font-size:14px;line-height:1.4;letter-spacing:-.01em}
.rcard-src{font-size:11.5px;color:var(--t3);margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rcard-time{margin-left:auto;font-size:11px;color:var(--t3);white-space:nowrap;font-weight:650;font-variant-numeric:tabular-nums}
.rcard-sum{margin:0;font-size:12.5px;line-height:1.6;color:var(--t2)}
.rcard-why{display:flex;gap:8px;font-size:12px;line-height:1.55;color:var(--warn-tx);background:rgba(224,134,0,.08);
  border-left:3px solid var(--warn);border-radius:6px 10px 10px 6px;padding:9px 12px}
.rcard-why svg{flex-shrink:0;margin-top:1px;color:var(--warn)}
.rcard-why.r4{color:var(--risk);background:var(--risk-bg);border-left-color:var(--risk)}
.rcard-why.r4 svg{color:var(--risk)}
.rcard-why.r5{color:var(--dark);background:var(--dark-bg);border-left-color:var(--dark)}
.rcard-why.r5 svg{color:var(--dark)}
.rcard-act{display:flex;gap:8px;font-size:12px;line-height:1.55;color:var(--navy);background:var(--navy-bg);
  border-left:3px solid var(--navy);border-radius:6px 10px 10px 6px;padding:9px 12px}
.rcard-act svg{flex-shrink:0;margin-top:1px}
.rcard-btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px}
.rbtn{display:inline-flex;align-items:center;gap:5px;font-weight:700;font-size:12px;border-radius:10px;padding:8px 12px;
  cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--t2);
  transition:border-color .13s,color .13s,background .13s,box-shadow .13s;box-shadow:var(--sh-xs)}
.rbtn:hover{border-color:rgba(27,42,107,.5);color:var(--navy)}
.rbtn.ok{background:var(--ok);border:1px solid var(--ok);color:#fff;box-shadow:0 1px 2px rgba(16,24,40,.08),0 4px 10px rgba(14,159,92,.25)}
.rbtn.ok:hover{background:#0C8A50;border-color:#0C8A50;color:#fff}
.rbtn.risk:hover{border-color:var(--risk);color:var(--risk);background:var(--risk-bg)}
.who{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);font-weight:600}
.contact{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--t2);background:#F8F9FB;border-radius:10px;padding:7px 10px;flex-wrap:wrap}
.contact b{color:var(--navy)}
.contact button{margin-left:auto}
.hold-prog{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--t2);font-weight:600;border-top:1px dashed var(--line);padding-top:10px}
.sw{width:37px;height:21px;border-radius:20px;background:#D8DCE4;border:none;cursor:pointer;position:relative;transition:background .18s;flex-shrink:0;margin-left:auto}
.sw::after{content:"";position:absolute;top:2.5px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.sw.on{background:var(--ok)} .sw.on::after{left:18px}
.sw:hover{filter:brightness(.97)}

/* ── 리스트(로그·적재) ── */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:13px;flex-wrap:wrap}
.fchip{font-size:12px;font-weight:650;color:var(--t2);background:var(--surface);border:1px solid var(--line);
  border-radius:999px;padding:6.5px 13px;cursor:pointer;transition:border-color .14s,color .14s,background .14s;box-shadow:var(--sh-xs)}
.fchip:hover{border-color:rgba(27,42,107,.4);color:var(--navy)}
.fchip.active{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 2px 8px rgba(27,42,107,.3)}
.searchbox{font-size:12.5px;border:1px solid var(--line);border-radius:11px;padding:8.5px 13px;min-width:200px;flex:1;max-width:300px;margin-left:auto;background:var(--surface);box-shadow:var(--sh-xs);transition:border-color .15s,box-shadow .15s}
.searchbox:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,42,107,.12)}
.searchbox::placeholder{color:var(--t3)}
.feed{display:flex;flex-direction:column;gap:7px}
.fitem{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:13px;
  padding:11px 14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;box-shadow:var(--sh-xs)}
.fitem:hover{border-color:rgba(27,42,107,.4);box-shadow:var(--sh-sm)}
.fitem-time{font-size:11px;color:var(--t3);font-weight:650;width:38px;flex-shrink:0;font-variant-numeric:tabular-nums}
.fitem-mid{flex:1;min-width:0}
.fitem-title{font-weight:650;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fitem-meta{font-size:11px;color:var(--t3);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fitem-r{display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.stagechip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:750;color:var(--navy);background:var(--navy-bg);border-radius:8px;padding:3px 9px;font-variant-numeric:tabular-nums}
.empty{padding:44px 10px;text-align:center;color:var(--t3);font-size:13px;line-height:1.7;background:rgba(255,255,255,.55);border:1px dashed #D5DAE2;border-radius:15px}
.empty svg{display:block;width:44px;height:44px;padding:11px;margin:0 auto 10px;background:var(--surface);border:1px solid var(--line);border-radius:13px;box-shadow:var(--sh-xs);color:var(--t3)}
.acard-path{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.oblig{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--teal);background:var(--teal-bg);border-radius:6px;padding:2px 7px;font-weight:650}
.oblig.warn{background:var(--warn-bg);color:var(--warn-tx)}

/* ── 권리 원장 ── */
.lic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.lic-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px 17px;display:flex;flex-direction:column;gap:9px;box-shadow:var(--sh-xs);transition:box-shadow .2s}
.lic-card:hover{box-shadow:var(--sh-sm)}
.lic-h{display:flex;align-items:flex-start;gap:9px}
.lic-name{font-weight:750;font-size:14px;letter-spacing:-.01em}
.lic-id{font-size:10.5px;color:var(--t3);font-weight:750;letter-spacing:.04em}
.dday{margin-left:auto;font-size:11px;font-weight:800;border-radius:7px;padding:3px 9px;white-space:nowrap;font-variant-numeric:tabular-nums}
.dday.okd{background:var(--ok-bg);color:var(--ok)} .dday.warnd{background:var(--warn-bg);color:var(--warn)} .dday.exp{background:var(--dark-bg);color:var(--dark)}
.lic-row{display:flex;gap:8px;font-size:12px;color:var(--t2);line-height:1.55}
.lic-row b{color:var(--text);min-width:56px;flex-shrink:0;font-size:11.5px}
.lic-docs{font-size:11.5px;color:var(--navy);background:var(--navy-bg);border-radius:9px;padding:7px 10px;font-weight:650}

/* ── 카탈로그 레벨 그룹 ── */
.lvgroup{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.setgrp.lvgroup{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:9px;align-items:start}
.setgrp.lvgroup>.lvgroup-h{grid-column:1/-1}
.lvgroup-h{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:6px 2px 0}
.lvgroup-h.tgl{cursor:pointer;user-select:none;padding:2px 1px}
.lvchev{color:var(--t3);flex-shrink:0;transition:transform .15s}
.lvgroup:not(.closed) .lvchev{transform:rotate(90deg)}
.lvgroup.closed>.catcard{display:none}
.lvgroup-h .lvd{font-size:11.5px;color:var(--t3)}
.lvgroup-h .lvcnt{margin-left:auto;font-size:10.5px;font-weight:750;color:var(--t2);background:#EFF1F5;border-radius:20px;padding:1.5px 8px;font-variant-numeric:tabular-nums}
.catcard{border:1px solid var(--line);border-radius:12px;padding:11px 13px;background:var(--surface)}
.catcard-h{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.catcard-h>b{font-size:12.5px}
.catcard-n{font-size:11.5px;color:var(--t3)}

/* ── 감사 로그 ── */
.audit{display:flex;flex-direction:column;gap:0;background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:6px 16px;box-shadow:var(--sh-xs)}
.a-item{display:flex;gap:12px;padding:10px 2px;border-bottom:1px solid var(--line2);font-size:12.5px;align-items:baseline}
.a-item:last-child{border-bottom:none}
.a-time{color:var(--t3);font-weight:650;font-size:11px;width:40px;flex-shrink:0;font-variant-numeric:tabular-nums}
.a-body{flex:1;color:var(--t2);line-height:1.55}
.a-body b{color:var(--text);font-weight:700}
.a-by{font-size:10.5px;font-weight:750;border-radius:6px;padding:2px 8px;flex-shrink:0;white-space:nowrap}
.a-by.ai{background:var(--navy-bg);color:var(--navy)} .a-by.hu{background:var(--warn-bg);color:var(--warn)} .a-by.sys{background:var(--viol-bg);color:var(--viol)}

/* ── 모달·다이얼로그 ── */
.mbg{position:fixed;inset:0;background:rgba(13,16,26,.5);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
  display:grid;place-items:center;padding:20px;z-index:50;overflow:auto;animation:fadebg .18s ease}
@keyframes fadebg{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:20px;max-width:760px;width:100%;max-height:88vh;display:flex;flex-direction:column;
  box-shadow:var(--sh-lg);animation:pop .2s cubic-bezier(.2,.8,.3,1.1)}
@keyframes pop{from{opacity:0;transform:scale(.965) translateY(8px)}to{opacity:1;transform:none}}
.modal.sm{max-width:520px}
/* 낮은 창(사이드 패널 등)에서는 본문을 찌그러뜨리지 말고 모달 전체를 배경 스크롤로 */
@media (max-height:560px){
  .mbg{place-items:start center}
  .modal,.modal.sm{max-height:none}
  .modal.drawer{position:static;max-width:380px;margin-left:auto}
}
.modal-h{display:flex;align-items:center;gap:9px;padding:16px 20px;border-bottom:1px solid var(--line);font-weight:800;font-size:15px;letter-spacing:-.01em}
.modal-h>svg{color:var(--navy);flex-shrink:0}
.modal-x{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--t3);padding:6px;border-radius:9px;display:grid;place-items:center;transition:background .13s,color .13s}
.modal-x:hover{background:#F1F3F7;color:var(--text)}
.modal-body{padding:18px 20px;overflow:auto;display:flex;flex-direction:column;gap:14px;overscroll-behavior:contain;min-height:0;flex:1 1 auto}
/* 설정 모달: 내용 길이와 무관하게 항상 같은 높이 — 본문이 밀려나는 것이 물리적으로 불가능 */
.modal.settings{max-width:1160px;height:min(90vh,1000px)}
@media (max-height:560px){.modal.settings{height:auto}}
.modal-f{display:flex;align-items:center;gap:9px;padding:14px 20px;border-top:1px solid var(--line);justify-content:flex-end;background:#FBFCFD;border-radius:0 0 20px 20px}
.modal-f .note{font-size:11.5px;color:var(--t3);margin-right:auto}
.mtabs{display:flex;gap:4px;padding:8px 14px;border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
.mtabs::-webkit-scrollbar{display:none}
.mtab{font-weight:650;font-size:12.5px;color:var(--t2);background:none;border:none;cursor:pointer;padding:8px 11px;
  border-radius:9px;display:inline-flex;gap:6px;align-items:center;white-space:nowrap;transition:background .14s,color .14s;flex-shrink:0}
.mtab:hover{background:#F1F3F7;color:var(--text)}
.mtab.active{color:var(--navy);background:var(--navy-bg);font-weight:750}

/* ── 설정 폼 ── */
.setgrp{display:flex;flex-direction:column;gap:9px;background:#FBFCFD;border:1px solid var(--line);border-radius:14px;padding:14px 15px}
.setgrp-t{display:flex;align-items:center;gap:7px;font-weight:750;font-size:13.5px;letter-spacing:-.01em}
.setgrp-t>svg{color:var(--navy)}
.setgrp-d{font-size:12px;color:var(--t3);line-height:1.6}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:11.5px;font-weight:700;color:var(--t2)}
.fld input,.fld select,.fld textarea{font-size:12.5px;border:1px solid var(--line);border-radius:10px;padding:9px 12px;width:100%;background:var(--surface);transition:border-color .15s,box-shadow .15s}
.fld textarea{min-height:90px;resize:vertical;line-height:1.6}
.fld input:focus,.fld select:focus,.fld textarea:focus,.rule input:focus,.rule select:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,42,107,.12)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.usebox{display:flex;flex-direction:column;gap:8px}
.userow{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 13px}
.userow .ut{flex:1}.userow .ut b{font-size:13px;display:block}.userow .ut span{font-size:11.5px;color:var(--t3)}
.lvrow{display:grid;grid-template-columns:86px 1fr 170px;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 12px}
.lvrow .d{font-size:11.5px;color:var(--t2);line-height:1.5}
.lvrow select{font-size:12px;border:1px solid var(--line);border-radius:9px;padding:7px 9px;background:var(--surface)}
.lvrow .fixed{font-size:11.5px;font-weight:700;color:var(--t3);display:flex;align-items:center;gap:5px}
.thres{display:flex;align-items:center;gap:12px}
.thres input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;background:#E7EAEF;outline:none}
.thres input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:5px solid var(--orange);box-shadow:0 1px 4px rgba(16,24,40,.25);cursor:pointer;transition:transform .12s}
.thres input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.1)}
.thres input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#fff;border:5px solid var(--orange);box-shadow:0 1px 4px rgba(16,24,40,.25);cursor:pointer}
.thres b{font-size:14px;color:var(--navy);min-width:52px;text-align:center;background:var(--navy-bg);border-radius:8px;padding:4px 6px;font-variant-numeric:tabular-nums}
.rule{display:flex;gap:7px;align-items:center}
.rule input,.rule select{font-size:12px;border:1px solid var(--line);border-radius:9px;padding:8px 11px;background:var(--surface);transition:border-color .15s,box-shadow .15s}
.rule input{flex:1}
.rule .del{background:none;border:none;color:var(--t3);cursor:pointer;padding:6px;border-radius:8px;display:grid;place-items:center;transition:background .13s,color .13s}
.rule .del:hover{color:var(--risk);background:var(--risk-bg)}
.miniadd{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:750;color:var(--navy);background:var(--navy-bg);border:none;border-radius:9px;padding:8px 12px;cursor:pointer;align-self:flex-start;transition:background .14s}
.miniadd:hover{background:rgba(27,42,107,.14)}
.srcrow{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 13px}
.srcrow .s-mid{flex:1;min-width:0}
.srcrow .s-name{font-weight:700;font-size:13px}
.srcrow .s-meta{font-size:11px;color:var(--t3);margin-top:3px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.conn-kind{font-size:10px;font-weight:750;color:var(--t3);background:#EFF1F5;border-radius:5px;padding:1.5px 6px}

/* ── 스냅샷·타임라인·메일 ── */
.snap{background:#FCFBF7;border:1px solid #EAE6DA;border-radius:13px;overflow:hidden}
.snap-h{display:flex;align-items:center;gap:7px;padding:9px 13px;background:#F4F1E8;font-size:11px;font-weight:700;color:#6E6A5B;flex-wrap:wrap;border-bottom:1px solid #EAE6DA}
.snap-b{padding:14px 16px;font-size:12.5px;line-height:1.8;color:#4A4638;font-family:Georgia,'Noto Serif KR',serif}
.snap-b mark{background:rgba(244,115,28,.28);border-radius:3px;padding:0 2px;color:inherit}
.hist{display:flex;flex-direction:column;gap:0;border-left:2px solid var(--line);margin-left:5px;padding-left:15px}
.h-item{position:relative;padding:6px 0;font-size:12px;color:var(--t2);line-height:1.55}
.h-item::before{content:"";position:absolute;left:-20.5px;top:13px;width:8px;height:8px;border-radius:50%;background:var(--surface);border:2.5px solid var(--navy)}
.h-item:first-child::before{border-color:var(--orange)}
.h-item b{color:var(--text)}
.h-item .ht{font-size:10.5px;color:var(--t3);font-weight:600}
.mailbox{font-size:12.5px;line-height:1.75;background:#FBFCFD;border:1px solid var(--line);border-radius:13px;padding:14px 16px;white-space:pre-wrap;color:var(--t2)}

/* ── 토스트·기타 ── */
.toastwrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{display:flex;align-items:center;gap:9px;background:#151926;color:#fff;font-size:12.5px;font-weight:600;border-radius:13px;padding:12px 18px;box-shadow:0 12px 36px rgba(0,0,0,.38);animation:up .28s cubic-bezier(.2,.8,.3,1.1);border:1px solid rgba(255,255,255,.08)}
.toast svg{color:#3DD68C;flex-shrink:0}
@keyframes up{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
.spin{animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.hint-back{font-size:10.5px;color:var(--t3);border:1px dashed #D5DAE2;border-radius:7px;padding:3px 8px;font-weight:600;white-space:nowrap}

/* ── 다운스트림 배포 (RAG·Viva) ── */
.dist{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:750;border-radius:6px;padding:2.5px 7px;white-space:nowrap}
.dist.sp{background:var(--navy-bg);color:var(--navy)}
.dist.on{background:var(--teal-bg);color:var(--teal)}
.dist.off{background:#EFF1F5;color:var(--t3)}
.mirror{display:flex;flex-direction:column;gap:8px;background:#F8F9FB;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.mir-row{display:grid;grid-template-columns:145px 1fr;gap:8px;font-size:11.5px;align-items:baseline}
.mir-row b{color:var(--navy);font-size:11px}
.mir-sys{color:var(--t2);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11px;word-break:break-all;line-height:1.6}

/* ── 비가역 플로우 요소 ── */
.cd{font-weight:800;font-size:18px;color:var(--navy);font-variant-numeric:tabular-nums;letter-spacing:.5px;
  background:var(--navy-bg);border-radius:10px;padding:5px 11px;flex-shrink:0;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
.cdbar{height:5px;border-radius:4px;background:#EDEFF3;overflow:hidden}
.cdbar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--orange),#FF9A55);transition:width 1s linear}
.fn{display:inline-flex;align-items:center;gap:5px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11px;color:var(--t2);background:#F8F9FB;border:1px solid var(--line);border-radius:8px;padding:3.5px 9px;word-break:break-all;margin-top:6px;line-height:1.55}
.warnbox{display:flex;gap:9px;align-items:flex-start;background:var(--risk-bg);color:var(--risk);border:1px solid rgba(180,35,24,.2);border-left:3px solid var(--risk);border-radius:6px 11px 11px 6px;padding:10px 13px;font-size:12.5px;font-weight:600;line-height:1.65}
.warnbox svg{flex-shrink:0;margin-top:2px}

/* ── 검토 대기 보조: 진행·우선순위·일괄·키보드 ── */
.qprog{display:flex;align-items:center;gap:10px;margin-bottom:12px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:12px;font-weight:650;color:var(--t2)}
.qprog>svg{color:var(--ok);flex-shrink:0}
.qprog .bar{flex:1;height:6px;border-radius:4px;background:#EDEFF3;overflow:hidden;min-width:60px}
.qprog .bar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--ok),#3DD68C);transition:width .3s}
.qprog b{color:var(--text);font-variant-numeric:tabular-nums}
.kbdhint{margin-left:auto;font-size:10.5px;color:var(--t3);font-weight:600;white-space:nowrap}
.kbdhint b{display:inline-block;background:#EFF1F5;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:0 5px;font-size:10px;color:var(--t2);font-family:ui-monospace,Consolas,monospace;margin:0 1px}
.bulkbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:var(--t2);font-weight:650}
.bulkbar>svg{color:var(--navy)}
.rcard.kbd-sel{border-color:transparent;box-shadow:0 0 0 2px var(--navy),var(--sh-sm)}
.pastdec{display:flex;align-items:baseline;gap:8px;font-size:12px;background:#F8F9FB;border:1px solid var(--line);border-radius:10px;padding:8px 11px;flex-wrap:wrap}
.pastdec .pd-r{color:var(--t3);font-size:11.5px;flex:1;min-width:120px}

/* ── 알림 드로어 ── */
.bellb{position:relative}
.bellb .bdg{position:absolute;top:-5px;right:-5px;background:var(--risk);color:#fff;font-size:9.5px;font-weight:800;font-style:normal;border-radius:999px;min-width:16px;height:16px;display:grid;place-items:center;padding:0 4px;border:2px solid #fff;line-height:1}
.modal.drawer{position:fixed;top:12px;right:12px;bottom:12px;max-width:380px;width:calc(100% - 24px);max-height:none;border-radius:16px;animation:slidein .22s cubic-bezier(.2,.8,.3,1)}
@keyframes slidein{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
.ntf{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1px solid var(--line);border-radius:12px;cursor:pointer;transition:border-color .13s,box-shadow .13s;background:var(--surface)}
.ntf:hover{border-color:rgba(27,42,107,.4);box-shadow:var(--sh-xs)}
.ntf-ico{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.ntf.warn .ntf-ico{background:var(--warn-bg);color:var(--warn)}
.ntf.risk .ntf-ico{background:var(--risk-bg);color:var(--risk)}
.ntf-t{font-size:12.5px;font-weight:700;line-height:1.45}
.ntf-d{font-size:11.5px;color:var(--t3);margin-top:2px;line-height:1.5}

.pipe-node{cursor:pointer}
.pipe-node:hover{border-color:rgba(27,42,107,.45)}

/* ── 반응형 ── */
@media (max-width:1120px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media (max-width:900px){.live{display:none}}
@media (max-width:840px){
  .hd-sub{display:none}
  .tabs{top:78px}
  .grid2,.lic-grid{grid-template-columns:1fr}
  .frow{grid-template-columns:1fr}
  .lvrow{grid-template-columns:76px 1fr}.lvrow select,.lvrow .fixed{grid-column:2}
  .mir-row{grid-template-columns:110px 1fr}
}
@media (max-width:640px){
  .app{padding:0 12px 32px}
  .hd{top:8px;margin-top:8px;padding:8px 12px;min-height:54px}
  .tabs{top:68px}
  .kpis{grid-template-columns:repeat(2,1fr);gap:9px}
  .kpi-num{font-size:25px}
  .btn{padding:8px 11px;font-size:12px}
  .brand span{display:none}
}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001s!important;transition:none!important}}
</style>

<div class="app" id="app"></div>

<script>
/* ═════════════════════════════════════════════════════════════════
   1) 유틸 + 아이콘
   ═════════════════════════════════════════════════════════════════ */
const ICONS={
"calendar":'<path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>',
"rotate-cw":'<path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>',
"check":'<path d="M20 6 9 17l-5-5"/>',

function kwsFor(c){return (c.aliases||[]).concat((DB.settings.licKeywords||[]).filter(r=>r.cat===c.id).map(r=>r.kw));}
function catEntry(d){
  if(d.catalogId)return CATALOG.find(c=>c.id===d.catalogId)||null;
  const hay=((d.lic||"")+" "+(d.snapMark||"")).toLowerCase();
  for(const c of CATALOG){
    if(kwsFor(c).some(k=>k&&hay.indexOf(k.toLowerCase())>=0)){d.catalogId=c.id;return c;}
  }
  return null;
}
const RULE_DESC={R01:"접근 통제 — 수집 차단",R02:"카탈로그 표준 표기 인식 (AI 분석 생략)",R06:"명시 조건 추출",R07:"L2 조건 ↔ 용도 불일치",R08:"무표기 — 보호 기본값",R09:"ⓒ+문의처 → 권리 확보 경로",R10:"유효 라이선스 적용",R11:"라이선스 번들 미충족",R12:"신뢰도 임계 미달",R13:"legal_review 미확정 — 자동 적재 금지",R14:"파일 내부 고지 불일치"};

function classifyCat(d){
  const t=((d.title||"")+" "+(d.summary||"")).toLowerCase();
  for(const r of DB.settings.classifyRules){
    const kws=(r.kw||"").split(",").map(s=>s.trim().toLowerCase()).filter(Boolean);
    if(kws.length&&kws.some(k=>t.indexOf(k)>=0))return r.cat;
  }
  const fb=DB.settings.classifyRules.find(r=>!(r.kw||"").trim());return fb?fb.cat:"기타";
}
function licStatus(l){
  if(l.revoked)return{k:"revoked",label:"해지됨"};
  const d=daysUntil(l.end);
  if(d<0)return{k:"expired",label:"만료"};
  if(d<=30)return{k:"expiring",label:"D-"+d+" 임박"};
  return{k:"active",label:"유효 · D-"+d};
}
/* 적재 = SharePoint+RAG+Viva '동시' 업로드(분리 불가)이므로,
   라이선스는 사내 열람·AI 인덱싱·교육 게시를 전부 커버해야만 업로드를 허용한다. */
function validLicenseFor(d){
  return DB.licenses.find(l=>{
    const s=licStatus(l).k; if(s!=="active"&&s!=="expiring")return false;
    if((d.source||"").indexOf(l.scope)<0)return false;
    if(l.uses.ai===false||!l.uses.education)return false; /* 번들 미충족 → 이 라이선스로는 적재 불가 */
    if(DB.settings.usage.commercial&&!l.uses.commercial)return false;
    if(DB.settings.usage.redistribute&&!l.uses.redistribute)return false;
    return true;
  });
}
/* evaluate — '업로드 자격'을 판정. uploaded 자격이어도 실제 업로드는
   원본 확보 → 유예 대기를 거쳐야만 실행된다. */
/* evaluate — '업로드 자격' 판정. 룰 테이블 R01~R15의 목업 구현 (명세 §1.5)
   판정 결과에 applied rules를 남겨 감사 로그의 "왜"를 재현 가능하게 한다. */
function evaluate(d){
  const R=[],entry=catEntry(d);if(entry)R.push("R02");
  const tag=r=>" ["+r.join("·")+"]";
  if(d.lv===5)return{route:"blocked",rules:["R01"],why:"L5 — 접근 통제 우회가 필요해 수집 단계에서 차단"+tag(["R01"])};
  const lic=validLicenseFor(d);
  if(lic){R.push("R10");return{route:"uploaded",lic:lic.id,rules:R,why:"기본 "+LV_META[d.lv].short+" ⊕ "+lic.id+" 적용 → 이용 가능"+tag(R)};}
  if(entry&&!entry.legalRef&&(entry.uses.ai==="r"||entry.uses.edu==="r")){R.push("R13");
    return{route:"review",rules:R,why:"카탈로그 "+entry.id+" 표기 인식 — "+(entry.uses.ai==="r"?"AI 인덱싱":"")+(entry.uses.ai==="r"&&entry.uses.edu==="r"?"·":"")+(entry.uses.edu==="r"?"Viva 교육":"")+" 용도가 법무 확정 대기(legal_review)라 자동 적재 금지"+tag(R)};}
  if(d.conf<DB.settings.confidenceThreshold){R.push("R12");
    return{route:"review",rules:R,why:"AI 신뢰도 "+d.conf+"% < 임계값 "+DB.settings.confidenceThreshold+"% — 사람 검토로 회부"+tag(R)};}
  if(d.lv===1){
    if(DB.settings.levelActions[1]==="review"){R.push("R12");return{route:"review",rules:R,why:"보수 모드 — L1도 검토로 강등"+tag(R)};}
    return{route:"uploaded",rules:R,why:"L1 자유 이용 — 자동 적재 경로"+(entry?" (카탈로그 "+entry.id+")":"")+tag(R.length?R:["R02"])};}
  if(d.lv===2){
    if(DB.settings.levelActions[2]==="review"){R.push("R12");return{route:"review",rules:R,why:"보수 모드 — L2를 검토로 강등"+tag(R)};}
    const c=d.cond||[];
    if(c.includes("nc")&&DB.settings.usage.commercial){R.push("R07");return{route:"held",rules:R,why:"L2 조건 불일치 — 비상업 한정 자료인데 상업적 이용이 설정됨"+tag(R)};}
    if(c.includes("no-redist")&&DB.settings.usage.redistribute){R.push("R07");return{route:"held",rules:R,why:"L2 조건 불일치 — 재배포 금지 자료인데 재배포 이용이 설정됨"+tag(R)};}
    R.push("R06");return{route:"uploaded",rules:R,why:"L2 조건("+c.join(", ")+")이 현재 이용 목적과 부합 — 조건부 적재 경로"+tag(R)};}
  if(d.lv===3){R.push("R08");return{route:"review",rules:R,why:"L3 라이선스 불명 — 표기 부재는 자유 이용이 아니라 보호가 기본값"+tag(R)};}
  const near=DB.licenses.find(l=>!l.revoked&&licStatus(l).k!=="expired"&&(d.source||"").indexOf(l.scope)>=0);
  if(near){R.push("R11");return{route:"held",rules:R,why:"L4 — "+near.id+" 계약은 있으나 용도 불충족("+(near.uses.ai===false?"AI 인덱싱 미포함":"교육 게시 미포함")+"). 적재는 RAG·Viva 동시 전파라 부분 적재가 불가능 — 용도 추가 협상 필요"+tag(R)};}
  R.push("R09");return{route:"held",rules:R,why:"L4 명시적 제한 — 유효한 라이선스 없음, 권리 확보 대기"+tag(R)};
}
function audit(docTitle,fromTo,by,note){
  DB.audit.unshift({t:nowHM(),doc:docTitle,move:fromTo,by:by,note:note||""});
}
function distFor(){return{rag:true,viva:true};} /* 분리 불가 — SP 업로드 순간 둘 다 */
function markDist(d){
  d.dist=distFor();
  audit(d.title,"배포: SharePoint(원본) → RAG · Viva 동시 업로드","시스템(배포)","분리 불가 — 폴더 트리 동일 미러 · 배포 확정");
}
function transition(d,to,by,note){
  const from=d.state; if(from===to)return;
  d.state=to; d.history.push({t:nowHM(),from,to,by,note:note||""});
  audit(d.title,(ROUTE_META[from]?ROUTE_META[from].label:from)+" → "+ROUTE_META[to].label,by,note);
  if(to==="uploaded")markDist(d);
}
/* ── 파일명 규칙: 사람이 읽는 제목 + 불변 포인터 코드 [AI365-ID·레벨·라이선스] ──
   포인터만 넣는 이유: 만료일 같은 가변 정보는 파일명이 거짓말을 하게 되므로,
   ID로 권리 원장·업로드 원장을 역추적하는 방식. SharePoint 금지 문자 제거 포함. */
function sanitizeTitle(t){return String(t).replace(/[\\/:*?"<>|#%&{}~]/g,"").replace(/\s+/g," ").trim().slice(0,34);}
function fileNameFor(d){
  const ext=(d.fileMeta&&d.fileMeta.ext)||"pdf";
  if(!DB.settings.naming)return sanitizeTitle(d.title)+"."+ext;
  return sanitizeTitle(d.title)+" [AI365-"+d.id+"·L"+d.lv+(d.appliedLic?"·"+d.appliedLic:"")+"]."+ext;
}
function genMeta(d,x){x=x||{};
  return{ext:x.ext||"pdf",size:x.size||"1.0MB",quality:x.quality||"native",inner:x.inner||"match",
   hash:"sha256:"+(d.id+"9f3ab27c4e11d8").slice(0,4).toLowerCase()+"…"+d.id.slice(1)};}
function delayMs(){return (DB.settings.uploadDelaySec||0)*1000;}
function delayLabel(){const s=DB.settings.uploadDelaySec;return s===0?"즉시":(s<3600?(s/60)+"분":(s/3600)+"시간");}

/* ── 비가역 적재 플로우: 자격 확정 → 원본 확보·대조 → 업로드 대기(유예) → 업로드 ── */
function beginFetch(d,by,ev,note){
  d.appliedLic=ev.lic||null;d.evalWhy=ev.why;if(ev.rules)d.rules=ev.rules;
  if(d.fileMeta){stageDoc(d,by,(note||"")+" · 원본 기확보("+d.fileMeta.hash+")");return;}
  transition(d,"fetching",by,"원본 확보 시작"+(d.fetchFail?" (누적 실패 "+d.fetchFail+"회 — 재시도)":"")+(note?" · "+note:""));
  render();
  setTimeout(()=>{
    d.fetchFail=0;d.fileMeta=genMeta(d,d.fileHint||{});
    audit(d.title,"원본 확보·검증 완료","AI 엔진","해시 "+d.fileMeta.hash+" · 파일 내부 고지 대조 "+(d.fileMeta.inner==="match"?"일치":"불일치")+" · 품질 "+d.fileMeta.quality);
    if(d.fileMeta.inner!=="match"){d.rules=["R14"];d.evalWhy="원본 내부 고지가 페이지 표기와 불일치 — 재판정 [R14]";transition(d,"review","AI 엔진","파일 내부 고지 불일치 — 재판정 회부 [R14]");render();return;}
    stageDoc(d,"시스템","");render();
  },1400);
}
function stageDoc(d,by,note){
  d.stagedTotal=delayMs();d.stagedUntil=Date.now()+d.stagedTotal;
  transition(d,"staged",by,"업로드 대기 — "+delayLabel()+" (이 구간에서만 취소 가능)"+(note||""));
}
function doUpload(d,by){
  d.spName=fileNameFor(d);d.uploadedAt=nowHM();
  const folder=DB.settings.catMap[d.cat]||DB.settings.folders[0];
  DB.uploads.unshift({t:d.uploadedAt,doc:d.title,name:d.spName,hash:d.fileMeta?d.fileMeta.hash:"—",lic:d.appliedLic||"—",folder});
  transition(d,"uploaded",by,"SharePoint 업로드 확정(비가역) · 파일명 "+d.spName+" · 업로드 원장 기록");

function reEvaluateAll(by,trigger){

  DB.docs.forEach(d=>{
    if(!["review","held","blocked"].includes(d.state))return;
    if(d.manual&&d.manual.route==="rejected")return;
    const ev=evaluate(d);
    if(ev.route==="uploaded"){changed++;beginFetch(d,by,ev,trigger);}
    else if(d.state!==ev.route){changed++;d.appliedLic=ev.lic||null;d.evalWhy=ev.why;d.rules=ev.rules||[];transition(d,ev.route,by,ev.why+(trigger?" · "+trigger:""));}
    else{d.evalWhy=ev.why;d.rules=ev.rules||[];d.appliedLic=ev.lic||null;}
  });

}

/* ── 검토 대기: 우선순위 정렬 + 진행감 + 묶음 승인 ── */
function queuePrio(d){
  const near=DB.licenses.find(l=>!l.revoked&&licStatus(l).k==="expiring"&&(d.source||"").indexOf(l.scope)>=0);
  if(near)return{p:0,chip:'<span class="sig risk" title="연관 계약의 만료가 임박 — 권리 협상 판단이 급한 건">'+ic("calendar",10)+'계약 '+esc(licStatus(near).label)+' 연관</span>'};
  if(d.conf<DB.settings.confidenceThreshold)return{p:1,chip:'<span class="sig warn" title="AI 신뢰도가 임계값 미만 — 사람 판단 우선 대상">'+ic("alert-triangle",10)+'저신뢰 '+d.conf+'%</span>'};
  return{p:2,chip:'<span class="sig" title="같은 우선순위 안에서는 오래 기다린 순서">'+ic("clock",10)+esc(d.time)+' 수집</span>'};
}
function queueHTML(){
  const list=DB.docs.filter(d=>d.state==="review");
  const total=reviewDone+list.length;
  const prog=total?'<div class="qprog">'+ic("check-check",13)+'오늘 검토 <b>'+reviewDone+'</b> / '+total+'건 처리<div class="bar"><i style="width:'+Math.round(reviewDone/Math.max(1,total)*100)+'%"></i></div><span class="kbdhint"><b>J</b><b>K</b> 이동 · <b>A</b> 승인 · <b>H</b> 보류 · <b>R</b> 반려 · <b>Enter</b> 상세</span></div>':'';
  if(!list.length)return prog+'<div class="empty">'+ic("check-check",22)+'<br>검토 대기 항목을 모두 처리했어요. 승인·반려 사유는 자동 판정 규칙 개선에 축적됩니다.</div>';
  const ranked=list.map(d=>({d,r:queuePrio(d)})).sort((a,b)=>(a.r.p-b.r.p)||(a.r.p===1?a.d.conf-b.d.conf:(a.d.time<b.d.time?-1:1)));
  const grp={};
  list.forEach(d=>{grp["src|"+d.source]=(grp["src|"+d.source]||[]).concat(d.id);if(d.catalogId)grp["cat|"+d.catalogId]=(grp["cat|"+d.catalogId]||[]).concat(d.id);});
  bulkGroups=Object.keys(grp).filter(k=>grp[k].length>=2).map(k=>({ids:grp[k],label:(k.indexOf("src|")===0?"출처 ":"카탈로그 ")+k.slice(4)}));
  const bulkbar=bulkGroups.length?'<div class="bulkbar">'+ic("layers",13)+'같은 판단 묶음:'+bulkGroups.map((b,i)=>'<button class="fchip" onclick="openBulk('+i+')" title="한 번의 사유로 묶음 전체를 승인 — 각 건은 개별로 원본 확보·대기(취소 가능)를 거칩니다">'+esc(b.label)+' '+b.ids.length+'건 일괄 승인</button>').join("")+'</div>':'';
  return prog+bulkbar+'<div class="grid2">'+ranked.map(x=>reviewCard(x.d,x.r.chip)).join("")+'</div>';
}

  ).join("")+staged.map(d=>{

function revokeLic(id){
  const l=DB.licenses.find(x=>x.id===id);if(!l)return;
  const up=DB.docs.filter(d=>d.appliedLic===l.id&&d.state==="uploaded").length;
  const stg=DB.docs.filter(d=>d.appliedLic===l.id&&(d.state==="staged"||d.state==="fetching")).length;
  confirmDlg("라이선스 해지 — 회수는 불가능합니다",
   "<b>"+esc(l.id)+" · "+esc(l.name)+"</b>를 해지합니다.<br><br>"+
   "· 신규 적재는 즉시 중단됩니다.<br>"+
   "· 업로드 대기 중 "+stg+"건은 아직 취소 가능해 <b>보류로 복귀</b>합니다.<br>"+
   "· 이미 업로드된 "+up+"건은 <b>회수할 수 없으며</b>"+(l.survival?" 잔존 조항으로 유지가 허용됩니다.":" 잔존 조항이 없어 <b>인시던트가 생성</b>됩니다 — 수동 삭제 조치가 필요합니다.")+"<br><br>계속할까요?",
   function(){
    l.revoked=true;audit("—","라이선스 해지: "+l.id,"관리자","권리 원장에서 해지");
    DB.settings.sources.forEach(s=>{if(s.licenseId===l.id&&s.on){s.on=false;audit("—","소스 자동 중지: "+s.name,"시스템(권리 원장)",l.id+" 해지 — 계약 소스의 수집을 중지");}});
    DB.docs.filter(d=>d.appliedLic===l.id&&d.state==="staged").forEach(d=>cancelStage(d,"held","시스템(권리 원장)","라이선스 해지로 대기 중 업로드 취소 — 보류 복귀"));
    const n=reEvaluateAll("시스템(권리 원장)","라이선스 "+l.id+" 해지 재평가");

  });
}

/* 알림 드로어 — 상태에서 실시간 계산 (읽음 처리 불필요: 원인이 해소되면 사라짐) */
function notifItems(){
  const items=[];
  DB.licenses.filter(l=>!l.revoked&&licStatus(l).k==="expiring").forEach(l=>{
    const d7=daysUntil(l.end)<=7;
    if((d7&&DB.settings.notify.d7)||(!d7&&DB.settings.notify.d30))
      items.push({sev:l.survival?"warn":"risk",icon:"calendar",t:l.id+" "+licStatus(l).label+(l.survival?"":" · 잔존 조항 없음"),d:"갱신 협상 또는 잔존 조항 확보가 필요합니다",act:"ledger"});
  });
  DB.docs.filter(d=>d.state==="staged"&&(d.folderConf||100)<DB.settings.folderThreshold).forEach(d=>
    items.push({sev:"warn",icon:"folder",t:"자동 업로드 보류 — 폴더 확인 필요",d:d.title,act:"staging"}));
  DB.docs.filter(d=>d.fetchFail).forEach(d=>
    items.push({sev:"warn",icon:"alert-triangle",t:"원본 확보 실패 ×"+d.fetchFail,d:d.title+" — 재시도 대기 또는 직접 업로드",act:"queue"}));
  DB.settings.sources.forEach(s=>{
    if(!s.licenseId||s.on)return;
    const l=DB.licenses.find(x=>x.id===s.licenseId);
    if(l&&(l.revoked||licStatus(l).k==="expired"))items.push({sev:"risk",icon:"radio",t:"소스 수집 중지: "+s.name,d:s.licenseId+" 계약 종료 — 갱신 전 재가동 금지",act:"none"});
  });
  const inc=DB.incidents.filter(i=>i.status!=="resolved").length;
  if(inc)items.push({sev:"risk",icon:"alert-triangle",t:"사후 조치 미결 "+inc+"건",d:"회수 불가분 수동 조치가 진행 중입니다",act:"incidents"});
  return items.sort((a,b)=>(a.sev==="risk"?0:1)-(b.sev==="risk"?0:1));
}
function openNotif(){dialog={type:"notif"};renderDialog();}
function notifDlg(){
  const items=notifItems();
  return '<div class="modal drawer" role="dialog" aria-modal="true" aria-label="알림"><div class="modal-h">'+ic("bell-ring",16)+'알림 <span class="hint-back">'+items.length+'건</span><button class="modal-x" onclick="closeDlg()" aria-label="닫기">'+ic("x",16)+'</button></div>'+

function applyBulk(){

  ids.forEach(id=>{const d=DB.docs.find(x=>x.id===id);if(!d||d.state!=="review")return;
    d.manual={route:"approved",reason,reasonShort:reason.slice(0,18)+(reason.length>18?"…":"")};

  kbdIdx=-1;toastMsg(n+"건 일괄 승인 — 원본 확보 후 업로드 대기로 이동합니다");render();

/* 정책 드라이런 — 변경을 적용하기 '전에' 미결 문서의 이동을 예측해 보여준다.
   특히 자동 적재 경로 진입(비가역까지 자동 진행)은 사전 확인이 필수. */
function policyPreview(title,mut,apply,extraNote){
  const S=DB.settings;
  const snap={u:JSON.parse(JSON.stringify(S.usage)),c:S.confidenceThreshold,l:JSON.parse(JSON.stringify(S.levelActions))};
  mut();
  const moves={};let up=0;
  DB.docs.forEach(d=>{
    if(!["review","held","blocked"].includes(d.state))return;
    if(d.manual&&d.manual.route==="rejected")return;
    const to=evaluate(d).route;
    if(to!==d.state){const k=ROUTE_META[d.state].label+" → "+(to==="uploaded"?"자동 적재 경로":ROUTE_META[to].label);moves[k]=(moves[k]||0)+1;if(to==="uploaded")up++;}
  });
  S.usage=snap.u;S.confidenceThreshold=snap.c;S.levelActions=snap.l;
  const parts=Object.keys(moves).map(k=>k+" <b>"+moves[k]+"건</b>");
  if(!parts.length){apply();return;}
  confirmDlg(title,
   "적용하면 미결 문서가 이렇게 이동합니다:<br><br>· "+parts.join("<br>· ")+
   (up?'<br><br><b style="color:var(--risk)">자동 적재 경로 진입 '+up+'건</b> — 원본 확보·대기를 거쳐 비가역 업로드까지 자동 진행됩니다.':"")+
   (extraNote?"<br><br>"+extraNote:"")+"<br><br>계속할까요?",
   apply,function(){if(settingsOpen)renderModal();});
}

function setFolderThreshold(v){v=parseInt(v,10);
  const cur=DB.settings.folderThreshold;
  const held=DB.docs.filter(d=>d.state==="staged"&&(d.folderConf||100)<v&&(d.folderConf||100)>=cur).length;
  const released=DB.docs.filter(d=>d.state==="staged"&&(d.folderConf||100)>=v&&(d.folderConf||100)<cur).length;
  const apply=function(){DB.settings.folderThreshold=v;
    audit("—","정책 변경: 폴더 신뢰도 임계 "+v+"%","관리자","미만이면 자동 업로드 보류 (R15)");
    DB.docs.forEach(d=>{if(d.state==="staged")d.folderHoldLogged=false;});
    toastMsg("폴더 임계 "+v+"% 적용");render();renderModal();};
  if(!held&&!released){apply();return;}
  confirmDlg("폴더 신뢰도 임계 "+v+"% — 변경 미리보기",
   (held?"대기 중 <b>"+held+"건</b>이 새로 <b>자동 업로드 보류</b>됩니다 — 사람이 폴더를 확인해야 확정할 수 있습니다.<br>":"")+
   (released?'<b style="color:var(--risk)">보류되던 '+released+'건</b>이 임계를 충족해 <b>대기 만료 시 자동 업로드(비가역)</b>됩니다.<br>':"")+
   "<br>계속할까요?",apply,function(){if(settingsOpen)renderModal();});
}

    audit("—","정책 변경: 신뢰도 임계값 "+v+"%","관리자","");
    const n=reEvaluateAll("시스템(정책)","임계값 변경 재평가");

function startSync(){
  if(syncing)return;
  if(syncIdx>=SYNC_POOL.length){toastMsg("데모 풀의 신규 문서를 모두 수집했습니다");return;}
  syncing=true;
  const d=makeDoc(SYNC_POOL[syncIdx++]);d.time=nowHM();d.state="pipeline";d.stage=SYNC_STAGES[0];
  DB.docs.unshift(d);audit(d.title,"수집 시작","AI 엔진","소스: "+d.source);
  activeView="log";logFilter="all";render();
  let i=0;
  const bar=()=>{const b=document.getElementById("syncbar"),m=document.getElementById("syncmsg");
    if(b)b.style.width=Math.round(((i+1)/(SYNC_STAGES.length+1))*100)+"%";
    if(m)m.textContent="“"+d.title.slice(0,20)+"…” — "+(d.stage||"판정")+" 단계 처리 중";};
  bar();
  const timer=setInterval(()=>{
    i++;
    if(i<SYNC_STAGES.length){d.stage=SYNC_STAGES[i];
      audit(d.title,SYNC_STAGES[i-1]+" 완료 → "+SYNC_STAGES[i],"AI 엔진",i===2?("신뢰도 "+d.conf+"% · "+LV_META[d.lv].short+" 판정"):"");
      render();bar();return;}
    clearInterval(timer);
    d.stage=null;
    d.history.push({t:d.time,from:"—",to:"수집·분류·요약 완료",by:"AI 엔진",note:"신뢰도 "+d.conf+"% · "+LV_META[d.lv].short+" 판정"});
    const ev=evaluate(d);
    syncing=false;
    if(ev.route==="uploaded"){
      audit(d.title,"검증 → 적재 자격 확정","AI 엔진",ev.why);
      beginFetch(d,"AI 엔진",ev,"동기화 자동 경로");
      toastMsg("신규 1건 — 원본 확보 후 업로드 대기로 이동합니다");
    }else{
      d.appliedLic=ev.lic||null;d.evalWhy=ev.why;d.rules=ev.rules||[];d.state=ev.route;
      d.history.push({t:d.time,from:"검증",to:ROUTE_META[ev.route].label,by:"AI 엔진",note:ev.why});
      audit(d.title,"검증 → "+ROUTE_META[ev.route].label,"AI 엔진",ev.why);
      toastMsg("신규 1건 처리 완료 — "+ROUTE_META[ev.route].label+" 처리됨");

document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){if(dialog)closeDlg();else if(settingsOpen)closeSettings();return;}
  /* 검토 대기 키보드 퀵 액션 — 다이얼로그·입력 중에는 비활성 */
  if(dialog||settingsOpen)return;
  const tag=((e.target&&e.target.tagName)||"").toLowerCase();
  if(tag==="input"||tag==="textarea"||tag==="select")return;
  if(activeView!=="queue")return;
  const cards=Array.prototype.slice.call(document.querySelectorAll('#view .rcard[data-id]'));
  if(!cards.length)return;
  const k=e.key.toLowerCase();
  if(k==="j"||k==="k"){
    kbdIdx=Math.max(0,Math.min(cards.length-1,(kbdIdx<0?-1:kbdIdx)+(k==="j"?1:-1)));
    cards.forEach((c,i)=>c.classList.toggle("kbd-sel",i===kbdIdx));
    if(cards[kbdIdx].scrollIntoView)cards[kbdIdx].scrollIntoView({block:"nearest",behavior:"smooth"});
    e.preventDefault();
  }else if(kbdIdx>=0&&cards[kbdIdx]){
    const id=cards[kbdIdx].getAttribute("data-id");
    if(k==="a")openDecision(id,"approve");
    else if(k==="r")openDecision(id,"reject");
    else if(k==="h")holdDoc(id);
    else if(k==="enter"||k==="o")openDetail(id);
  }
});
</script>
</body>
</html>
